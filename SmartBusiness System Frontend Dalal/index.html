<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>SmartBusiness System | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">

    <script src="assets/js/theme.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        body.dark {
            /* background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); */
            background: linear-gradient(135deg, #0b1220 0%, #0b1220 100%);
        }
        
        .sidebar, .topbar {
            display: none !important;
        }
        
        .main-content {
            margin-left: 0 !important;
            padding: 0 !important;
            background: transparent !important;
        }
        
        .auth-theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
            transition: all 0.3s ease;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .auth-theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }
        
        body.dark .auth-theme-toggle {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Floating shapes background */
        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
            z-index: 0;
        }

        .shape-1 { width: 300px; height: 300px; top: -100px; left: -100px; animation-delay: 0s; }
        .shape-2 { width: 200px; height: 200px; bottom: -50px; right: -50px; animation-delay: 5s; }
        .shape-3 { width: 150px; height: 150px; top: 50%; left: 80%; animation-delay: 10s; }
        .shape-4 { width: 100px; height: 100px; bottom: 20%; left: 10%; animation-delay: 2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        .auth-card {
            animation: slideUp 0.6s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group input {
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            transform: translateX(5px);
        }

        .auth-btn {
            position: relative;
            overflow: hidden;
        }

        .auth-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .auth-btn:active::after {
            width: 200px;
            height: 200px;
        }

        .notification-toast {
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .auth-form {
            transition: all 0.4s ease;
        }

        .auth-switch a {
            position: relative;
        }

        .auth-switch a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #4f46e5;
            transition: width 0.3s;
        }

        .auth-switch a:hover::after {
            width: 100%;
        }

        .greeting-text {
            font-size: 14px;
            color: #4f46e5;
            margin-bottom: 5px;
            font-weight: 500;
        }

    </style>
</head>

<body>

    <!-- Floating Shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>

    <div class="auth-theme-toggle" id="darkModeBtn">
        <i class="fas fa-moon"></i>
    </div>

    <main class="main-content">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <img src="assets/images/logos/logo.png" alt="Logo" class="logo-img">
                        <h2>Smart<span>Business</span></h2>
                    </div>
                    <p class="auth-subtitle">Manage your business efficiently</p>
                </div>

                <!-- Login Form -->
                <div class="auth-form" id="loginForm">
                    <div class="greeting-text" id="greetingText">Welcome back!</div>
                    <h3>Sign in to your account</h3>
                    <p class="form-desc">Enter your credentials to access your dashboard</p>

                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Email address" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <i class="fas fa-eye-slash toggle-password" data-target="loginPassword"></i>
                    </div>

                    <div class="auth-options">
                        <label class="checkbox">
                            <input type="checkbox" id="rememberMe"> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button class="auth-btn" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>

                    <p class="auth-switch">
                        Don't have an account?
                        <a href="#" id="showRegister">Create account</a>
                    </p>
                </div>

                <!-- Register Form -->
                <div class="auth-form" id="registerForm" style="display: none;">
                    <div class="greeting-text">Join us!</div>
                    <h3>Create new account</h3>
                    <p class="form-desc">Start your journey with SmartBusiness</p>

                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regName" placeholder="Full name" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="Email address" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Password" required>
                        <i class="fas fa-eye-slash toggle-password" data-target="regPassword"></i>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm password" required>
                        <i class="fas fa-eye-slash toggle-password" data-target="regConfirmPassword"></i>
                    </div>

                    <button class="auth-btn" id="registerBtn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>

                    <p class="auth-switch">
                        Already have an account?
                        <a href="#" id="showLogin">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Dynamic greeting based on time
        function updateGreeting() {
            const hour = new Date().getHours();
            const greetingElement = document.querySelector('#loginForm .greeting-text');
            if (greetingElement) {
                if (hour < 12) greetingElement.innerHTML = 'Good morning!';
                else if (hour < 18) greetingElement.innerHTML = 'Good afternoon!';
                else greetingElement.innerHTML = 'Good evening!';
            }
        }
        updateGreeting();

        // Toggle forms with animation
        document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            loginForm.style.opacity = '0';
            setTimeout(() => {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                setTimeout(() => registerForm.style.opacity = '1', 10);
            }, 200);
            registerForm.style.opacity = '0';
        });

        document.getElementById('showLogin').addEventListener('click', (e) => {
            e.preventDefault();
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            registerForm.style.opacity = '0';
            setTimeout(() => {
                registerForm.style.display = 'none';
                loginForm.style.display = 'block';
                setTimeout(() => loginForm.style.opacity = '1', 10);
            }, 200);
            loginForm.style.opacity = '0';
        });

        // Toggle password
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const target = document.getElementById(this.dataset.target);
                if (target.type === 'password') {
                    target.type = 'text';
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                } else {
                    target.type = 'password';
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                }
            });
        });

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `notification-toast ${type}`;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function loginUser(email, password, rememberMe) {
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.message || 'Login failed');
                }

                const userData = {
                    ...result.user,
                    isLoggedIn: true
                };

                if (rememberMe) {
                    localStorage.setItem('user', JSON.stringify(userData));
                } else {
                    sessionStorage.setItem('user', JSON.stringify(userData));
                }

                showToast(result.message, 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function registerUser(name, email, password) {
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.message || 'Registration failed');
                }

                showToast(result.message, 'success');
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('regName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regConfirmPassword').value = '';
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Login
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!email || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            loginUser(email, password, rememberMe);
        });

        // Register
        document.getElementById('registerBtn').addEventListener('click', () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (!name || !email || !password || !confirmPassword) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            registerUser(name, email, password);
        });

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').style.display !== 'none') {
                    document.getElementById('loginBtn').click();
                } else {
                    document.getElementById('registerBtn').click();
                }
            }
        });

        // Dark mode
        const darkBtn = document.getElementById('darkModeBtn');
        const darkIcon = darkBtn?.querySelector('i');
        
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            if (darkIcon) {
                darkIcon.classList.remove('fa-moon');
                darkIcon.classList.add('fa-sun');
            }
        }
        
        if (darkBtn) {
            darkBtn.addEventListener('click', () => {
                const isDark = document.body.classList.toggle('dark');
                if (darkIcon) {
                    darkIcon.classList.toggle('fa-moon', !isDark);
                    darkIcon.classList.toggle('fa-sun', isDark);
                }
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
        }

        // Set initial opacity
        document.getElementById('loginForm').style.opacity = '1';
        document.getElementById('registerForm').style.opacity = '1';
    </script>

</body>

</html>
